<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Hexagon base -->
  <polygon 
    points="50,5 90,27.5 90,72.5 50,95 10,72.5 10,27.5" 
    stroke="#e5e5e5" 
    stroke-width="3" 
    fill="none"
  />
  
  <!-- Central atom/circle -->
  <circle cx="50" cy="50" r="8" fill="#e5e5e5" />
  
  <!-- Three bonds / connecting lines -->
  <line x1="50" y1="42" x2="50" y2="22" stroke="#e5e5e5" stroke-width="2" />
  <line x1="42" y1="58" x2="27" y2="72" stroke="#e5e5e5" stroke-width="2" />
  <line x1="58" y1="58" x2="73" y2="72" stroke="#e5e5e5" stroke-width="2" />
  
  <!-- Small orbiting dots -->
  <circle cx="50" cy="22" r="2.5" fill="#9ca3af" />
  <circle cx="27" cy="72" r="2.5" fill="#9ca3af" />
  <circle cx="73" cy="72" r="2.5" fill="#9ca3af" />
</svg>